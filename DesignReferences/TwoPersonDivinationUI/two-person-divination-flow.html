<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Two Person Divination UI Flow</title>
  <style>
    :root {
      --gold: #f4cf85;
      --gold-2: #aa733a;
      --violet: #9b58ff;
      --violet-2: #d9b1ff;
      --ink: #070610;
      --panel: rgba(25, 19, 39, 0.82);
      --line: rgba(238, 184, 103, 0.58);
      --text: #fff7e8;
      --muted: #b9adc0;
      --green: #75ed91;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: block;
      background: #05050b;
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    .phone {
      position: relative;
      width: 540px;
      height: 960px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 13%, rgba(103, 47, 155, 0.32), transparent 28%),
        radial-gradient(circle at 16% 78%, rgba(108, 62, 174, 0.22), transparent 24%),
        radial-gradient(circle at 91% 48%, rgba(204, 130, 52, 0.15), transparent 23%),
        linear-gradient(180deg, #090815 0%, #10091b 42%, #05050b 100%);
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.65;
      background-image:
        radial-gradient(circle at 32px 80px, rgba(255, 220, 150, 0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 91px 196px, rgba(187, 115, 255, 0.72) 0 1px, transparent 2px),
        radial-gradient(circle at 210px 119px, rgba(255, 255, 255, 0.62) 0 1px, transparent 2px),
        radial-gradient(circle at 350px 246px, rgba(236, 185, 104, 0.82) 0 1px, transparent 2px),
        radial-gradient(circle at 391px 586px, rgba(172, 101, 255, 0.72) 0 1px, transparent 2px),
        radial-gradient(circle at 70px 705px, rgba(255, 255, 255, 0.6) 0 1px, transparent 2px);
      background-size: 100% 100%;
      z-index: -2;
    }

    .phone::after {
      content: "";
      position: absolute;
      inset: 54px 22px 108px;
      border-radius: 260px;
      opacity: 0.32;
      background:
        repeating-radial-gradient(circle at 50% 30%, transparent 0 22px, rgba(223, 156, 74, 0.12) 23px 24px),
        conic-gradient(from 0deg, transparent, rgba(134, 71, 180, 0.38), transparent, rgba(221, 163, 74, 0.24), transparent);
      mask-image: radial-gradient(circle, #000 0 55%, transparent 70%);
      z-index: -1;
    }

    .statusbar {
      height: 48px;
      padding: 16px 32px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .signals {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .bars {
      display: flex;
      align-items: end;
      gap: 2px;
      height: 14px;
    }

    .bars span {
      width: 3px;
      background: #fff;
      border-radius: 3px;
      display: block;
    }

    .bars span:nth-child(1) { height: 5px; }
    .bars span:nth-child(2) { height: 8px; }
    .bars span:nth-child(3) { height: 11px; }
    .bars span:nth-child(4) { height: 14px; }

    .wifi {
      width: 18px;
      height: 13px;
      border: 3px solid #fff;
      border-bottom: 0;
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 18px 18px 0 0;
      position: relative;
    }

    .wifi::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      left: 50%;
      bottom: -1px;
      transform: translateX(-50%);
      background: #fff;
      border-radius: 50%;
    }

    .battery {
      width: 25px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 4px;
      position: relative;
    }

    .battery::before {
      content: "";
      position: absolute;
      inset: 2px 5px 2px 2px;
      background: #fff;
      border-radius: 2px;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 3px;
      width: 3px;
      height: 5px;
      background: #fff;
      border-radius: 0 2px 2px 0;
    }

    .navtop {
      height: 52px;
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back {
      width: 28px;
      height: 28px;
      position: relative;
    }

    .back::before {
      content: "";
      position: absolute;
      width: 13px;
      height: 13px;
      border-left: 3px solid var(--gold);
      border-bottom: 3px solid var(--gold);
      transform: rotate(45deg);
      left: 7px;
      top: 7px;
    }

    .round-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--gold);
      background: rgba(22, 14, 29, 0.68);
      box-shadow: 0 0 18px rgba(179, 105, 255, 0.18);
      font-size: 20px;
    }

    .content {
      padding: 0 40px 102px;
    }

    .title {
      margin-top: 4px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      font-size: 15px;
      margin-bottom: 8px;
    }

    .spark {
      color: var(--gold);
      text-shadow: 0 0 16px rgba(249, 207, 135, 0.7);
    }

    h1 {
      margin: 0;
      font-size: 31px;
      font-weight: 500;
      line-height: 1.22;
      color: #ffe4ad;
      text-shadow: 0 0 18px rgba(237, 176, 103, 0.22);
    }

    .subtitle {
      margin: 8px auto 0;
      color: #d6ccd6;
      font-size: 14px;
      line-height: 1.58;
      max-width: 420px;
      text-align: center;
    }

    .panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(35, 26, 50, 0.92), rgba(14, 13, 25, 0.88)),
        radial-gradient(circle at 20% 0%, rgba(138, 78, 215, 0.36), transparent 36%);
      box-shadow: inset 0 0 28px rgba(102, 58, 161, 0.22), 0 16px 42px rgba(0, 0, 0, 0.34);
    }

    .friend-line {
      padding: 13px 16px;
      display: grid;
      grid-template-columns: 54px 1fr 54px;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background:
        radial-gradient(circle at 50% 35%, #ffd79a 0 6px, transparent 7px),
        radial-gradient(circle at 50% 76%, #40204f 0 19px, transparent 20px),
        linear-gradient(135deg, #2b173d, #0b0a13);
      box-shadow: 0 0 18px rgba(234, 176, 92, 0.3);
      position: relative;
    }

    .avatar.you {
      background:
        radial-gradient(circle at 50% 35%, #f0c58d 0 6px, transparent 7px),
        radial-gradient(circle at 50% 76%, #5a3344 0 19px, transparent 20px),
        linear-gradient(135deg, #2c1b2d, #080812);
    }

    .avatar.friend::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 3px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid #17111e;
    }

    .friend-copy {
      text-align: center;
      min-width: 0;
    }

    .friend-copy .name {
      font-size: 20px;
      color: #ffe3ad;
      line-height: 1.15;
    }

    .friend-copy .desc {
      margin-top: 5px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .link-sigil {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(242, 199, 131, 0.8), transparent);
      margin: 0 21px;
      position: relative;
    }

    .link-sigil::after {
      content: "✦";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      background: #171020;
      border: 1px solid rgba(242, 199, 131, 0.55);
      box-shadow: 0 0 18px rgba(170, 94, 255, 0.28);
    }

    .rule-grid {
      padding: 13px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .rule {
      min-height: 66px;
      padding: 10px 10px;
      border-radius: 15px;
      border: 1px solid rgba(232, 176, 99, 0.35);
      background: rgba(9, 8, 18, 0.48);
    }

    .rule strong {
      display: block;
      color: #f2cd83;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .rule span {
      display: block;
      color: #c7bdc9;
      font-size: 11px;
      line-height: 1.42;
    }

    .cards-row {
      height: 245px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      align-items: center;
      margin-top: 20px;
    }

    .tarot-slot {
      text-align: center;
      min-width: 0;
    }

    .card {
      position: relative;
      width: 116px;
      height: 176px;
      margin: 0 auto 11px;
      border-radius: 12px;
      border: 1.5px solid #c28a42;
      background:
        radial-gradient(circle at 50% 48%, rgba(180, 105, 255, 0.62) 0 3px, transparent 5px),
        radial-gradient(circle at 50% 50%, transparent 0 20px, rgba(235, 193, 117, 0.16) 21px 22px, transparent 23px),
        radial-gradient(circle at 50% 50%, transparent 0 38px, rgba(235, 193, 117, 0.12) 39px 40px, transparent 41px),
        linear-gradient(155deg, #211331, #080813 64%, #2a1939);
      box-shadow: 0 0 13px rgba(231, 174, 89, 0.22);
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(237, 190, 111, 0.36);
      border-radius: 8px;
    }

    .card::after {
      inset: 18px;
      border-style: dashed;
      opacity: 0.45;
    }

    .card .star {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 42px;
      color: #ffd98d;
      text-shadow: 0 0 22px rgba(190, 96, 255, 0.95);
    }

    .card.glow {
      border-color: #f4d189;
      box-shadow:
        0 0 0 2px rgba(198, 122, 255, 0.42),
        0 0 24px rgba(169, 80, 255, 0.86),
        inset 0 0 35px rgba(178, 89, 255, 0.34);
    }

    .card.locked {
      filter: saturate(0.65) brightness(0.72);
      opacity: 0.72;
    }

    .card.face {
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 213, 127, 0.36), transparent 22%),
        linear-gradient(180deg, rgba(44, 23, 57, 0.15), rgba(5, 6, 15, 0.12)),
        linear-gradient(145deg, #17152b, #090914 70%);
    }

    .card.face .scene {
      position: absolute;
      inset: 12px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 49% 32%, #ffdc92 0 5px, rgba(255,220,146,0.18) 7px 22px, transparent 23px),
        linear-gradient(155deg, transparent 0 46%, rgba(163, 85, 255, 0.34) 47% 48%, transparent 49%),
        radial-gradient(circle at 46% 52%, rgba(255, 255, 255, 0.12), transparent 23%),
        linear-gradient(180deg, #1c1533, #090917);
    }

    .card.face .scene::before {
      content: "";
      position: absolute;
      left: 31px;
      top: 42px;
      width: 36px;
      height: 50px;
      border-radius: 30px 30px 16px 16px;
      background: linear-gradient(180deg, rgba(245, 191, 126, 0.36), rgba(107, 62, 150, 0.5));
      box-shadow: -13px 10px 0 rgba(23, 14, 31, 0.55);
    }

    .slot-label {
      font-size: 15px;
      color: #eed29c;
      line-height: 1.25;
      white-space: nowrap;
    }

    .slot-sub {
      margin-top: 4px;
      font-size: 11px;
      color: #a89caf;
      line-height: 1.3;
    }

    .status-card {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 17px;
      border: 1px solid rgba(232, 176, 99, 0.44);
      background: rgba(18, 14, 29, 0.76);
    }

    .status-card .line {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #f2cc82;
      font-size: 15px;
      line-height: 1.3;
    }

    .status-card p {
      margin: 6px 0 0 25px;
      color: #bfb5c4;
      font-size: 12px;
      line-height: 1.45;
    }

    .progress {
      margin-top: 14px;
      padding: 15px 16px 14px;
      border-radius: 18px;
      border: 1px solid rgba(232, 176, 99, 0.38);
      background:
        linear-gradient(180deg, rgba(30, 24, 44, 0.86), rgba(11, 10, 19, 0.82)),
        radial-gradient(circle at 50% 0%, rgba(141, 74, 212, 0.28), transparent 50%);
    }

    .progress h2 {
      margin: 0;
      color: #f1cf87;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.35;
      text-align: center;
    }

    .rail {
      margin: 19px 19px 0;
      height: 2px;
      background: rgba(202, 174, 137, 0.28);
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dot {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      border: 1.5px solid rgba(213, 190, 151, 0.62);
      background: #151120;
      display: grid;
      place-items: center;
      color: #807489;
      font-size: 12px;
      transform: translateY(-1px);
    }

    .dot.done {
      background: radial-gradient(circle, #9e5cff, #3d225e);
      color: #fff;
      border-color: #e5b9ff;
      box-shadow: 0 0 18px rgba(170, 90, 255, 0.85);
    }

    .dot.current {
      background: radial-gradient(circle, #ffd78a, #6a4120);
      color: #211018;
      border-color: #ffe0a1;
      box-shadow: 0 0 19px rgba(249, 200, 123, 0.72);
    }

    .step-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin-top: 13px;
      text-align: center;
      color: #a99fad;
      font-size: 11px;
    }

    .step-labels .active {
      color: #dcb1ff;
    }

    .cta-area {
      position: absolute;
      left: 40px;
      right: 40px;
      bottom: 83px;
    }

    .cta {
      width: 100%;
      height: 64px;
      border: 1px solid #f2cc82;
      border-radius: 36px;
      display: grid;
      place-items: center;
      color: #ffe7b1;
      font-size: 24px;
      background:
        radial-gradient(circle at 18% 50%, rgba(255, 231, 175, 0.95) 0 3px, transparent 6px),
        radial-gradient(circle at 82% 50%, rgba(255, 231, 175, 0.95) 0 3px, transparent 6px),
        linear-gradient(90deg, #3e1d66, #7932a7 52%, #332049);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.16),
        0 0 26px rgba(165, 76, 255, 0.52);
      text-shadow: 0 0 12px rgba(255, 229, 180, 0.32);
    }

    .cta.disabled {
      color: #9e92a4;
      border-color: rgba(180, 139, 83, 0.42);
      background:
        linear-gradient(90deg, rgba(51, 45, 63, 0.82), rgba(35, 31, 45, 0.86));
      box-shadow: none;
    }

    .helper {
      margin-top: 12px;
      color: #a99fad;
      font-size: 13px;
      text-align: center;
      line-height: 1.4;
    }

    .secondary-row {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .ghost-btn {
      min-height: 48px;
      border-radius: 16px;
      border: 1px solid rgba(232, 176, 99, 0.38);
      color: #dfc595;
      background: rgba(14, 12, 21, 0.66);
      display: grid;
      place-items: center;
      font-size: 15px;
    }

    .bottom-nav {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 18px;
      height: 58px;
      border-radius: 28px;
      background: rgba(23, 24, 34, 0.92);
      border: 1px solid rgba(255,255,255,0.06);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding-top: 8px;
      color: #928b96;
      font-size: 10px;
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .nav-item {
      display: grid;
      justify-items: center;
      gap: 2px;
    }

    .nav-icon {
      width: 22px;
      height: 18px;
      position: relative;
      color: currentColor;
    }

    .nav-icon::before {
      content: "✦";
      font-size: 18px;
      line-height: 18px;
    }

    .nav-item.active {
      color: #d69cff;
      text-shadow: 0 0 14px rgba(178, 89, 255, 0.9);
    }

    .invite-summary {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 17px;
      background: rgba(19, 14, 28, 0.78);
      border: 1px solid rgba(232, 176, 99, 0.38);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .invite-summary strong {
      display: block;
      color: #f6d18b;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .invite-summary span {
      color: #beb3c2;
      font-size: 12px;
      line-height: 1.5;
    }

    .pill {
      flex: 0 0 auto;
      padding: 8px 11px;
      border-radius: 14px;
      color: #1a0d1e;
      background: linear-gradient(180deg, #ffe0a2, #b67a38);
      font-size: 12px;
      box-shadow: 0 0 14px rgba(245, 203, 132, 0.38);
    }

    .small-note {
      margin-top: 8px;
      padding: 9px 12px;
      border-radius: 15px;
      border: 1px solid rgba(190, 145, 84, 0.3);
      background: rgba(12, 10, 19, 0.58);
      color: #a99fad;
      font-size: 11px;
      line-height: 1.45;
    }

    .countdown {
      margin-top: 17px;
      text-align: center;
    }

    .countdown .time {
      color: #ffe0a0;
      font-size: 38px;
      line-height: 1;
      text-shadow: 0 0 20px rgba(244, 184, 95, 0.34);
    }

    .countdown .label {
      margin-top: 8px;
      color: #aba0b1;
      font-size: 12px;
    }

    .readiness {
      margin-top: 13px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .person-state {
      padding: 11px 10px;
      border-radius: 16px;
      border: 1px solid rgba(232, 176, 99, 0.34);
      background: rgba(15, 12, 23, 0.68);
      text-align: center;
    }

    .person-state .mini-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      margin: 0 auto 8px;
      background:
        radial-gradient(circle at 50% 35%, #f5cb90 0 4px, transparent 5px),
        radial-gradient(circle at 50% 78%, #56315c 0 13px, transparent 14px),
        linear-gradient(145deg, #251431, #0d0b14);
    }

    .person-state strong {
      color: #f4ce85;
      font-size: 15px;
      font-weight: 500;
    }

    .person-state span {
      display: block;
      margin-top: 5px;
      color: #b7acbb;
      font-size: 12px;
    }

    .seal {
      margin: 18px auto 0;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: 1px solid rgba(242, 204, 130, 0.48);
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle, rgba(255, 220, 150, 0.2), transparent 58%),
        conic-gradient(from 0deg, rgba(242, 204, 130, 0.12), rgba(159, 83, 255, 0.38), rgba(242, 204, 130, 0.12));
      box-shadow: 0 0 40px rgba(164, 81, 255, 0.32);
      color: #ffe2a5;
      font-size: 42px;
    }

    .screen-invite .cards-row {
      height: 160px;
      margin-top: 11px;
    }

    .screen-invite .card {
      width: 86px;
      height: 128px;
      margin-bottom: 8px;
    }

    .screen-invite .card .star {
      font-size: 32px;
    }

    .screen-invite .slot-label {
      font-size: 13px;
    }

    .screen-sent .cards-row {
      grid-template-columns: 0.78fr 1.25fr 0.78fr;
      height: 210px;
      margin-top: 18px;
    }

    .screen-sent .tarot-slot.side {
      opacity: 0.62;
      transform: scale(0.88);
    }

    .screen-sent .card {
      width: 116px;
      height: 176px;
    }

    .screen-waiting .cards-row,
    .screen-reveal .cards-row {
      height: 214px;
      margin-top: 14px;
    }

    .screen-reveal .card.glow {
      transform: translateY(-7px) scale(1.04);
    }

    .screen-reveal .progress {
      margin-top: 13px;
    }

    .screen-reveal .seal {
      margin-top: 14px;
    }

    @media (max-width: 540px) {
      .phone {
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <main id="app" class="phone"></main>

  <script>
    const screens = {
      invite: {
        cls: "screen-invite",
        help: "?",
        eyebrow: "双人占卜邀请",
        title: "邀请 Luna 开启占卜",
        subtitle: "你们将各自翻开属于自己的牌，最后共同揭示关系指引。",
        body: `

    function card(mod = "") {
      return `<div class="card ${mod}"><span class="star">✦</span></div>`;
    }

    function slot(symbol, label, sub, mod = "") {
      return `<div class="tarot-slot">${card(mod).replace("✦", symbol)}<div class="slot-label">${label}</div><div class="slot-sub">${sub}</div></div>`;
    }

    function slotFace(label, sub) {
      return `<div class="tarot-slot"><div class="card face"><div class="scene"></div></div><div class="slot-label">${label}</div><div class="slot-sub">${sub}</div></div>`;
    }

    function progress(title, labels, active) {
      return `
        <section class="progress">
          <h2>${title}</h2>
          <div class="rail">
            <div class="dot ${active.includes(1) ? "done" : ""}">1</div>
            <div class="dot ${active.includes(2) ? "current" : ""}">2</div>
            <div class="dot ${active.includes(3) ? "current" : ""}">3</div>
          </div>
          <div class="step-labels">
            ${labels.map((label, index) => `<span class="${active.includes(index + 1) ? "active" : ""}">${label}</span>`).join("")}
          </div>
        </section>
      `;
    }

    function render() {
      const params = new URLSearchParams(location.search);
      const key = params.get("screen") || "invite";
      const screen = screens[key] || screens.invite;
      document.getElementById("app").className = `phone ${screen.cls}`;
      document.getElementById("app").innerHTML = `
        <div class="statusbar">
          <div>9:41</div>

        <div class="navtop"><div class="back"></div><div class="round-icon">${screen.help}</div></div>
        <section class="content">
          <div class="title">
            <div class="eyebrow"><span class="spark">✦</span><span>${screen.eyebrow}</span><span class="spark">✦</span></div>
            <h1>${screen.title}</h1>
            <div class="subtitle">${screen.subtitle}</div>
          </div>
          ${screen.body}
        </section>
        <div class="cta-area">
          <div class="cta">${screen.cta}</div>
          <div class="helper">${screen.helper}</div>

          <div class="nav-item"><div class="nav-icon"></div><div>我的</div></div>
        </nav>
      `;
    }

    render();
  </script>
